<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citation Validator</title>
  <meta http-equiv="refresh" content="0; url=./citation-validator.html">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, #eef2f9 0%, #f8fafc 100%);
      color: #142033;
    }
    .card {
      width: min(680px, 92vw);
      background: #ffffff;
      border: 1px solid #d7deea;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(20, 32, 51, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }
    p {
      margin: 8px 0;
      line-height: 1.45;
    }
    a {
      color: #1f6feb;
      font-weight: 700;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Citation Validator</h1>
    <p>Redirecting to the public validator page...</p>
    <p>If it does not open automatically, use this link:</p>
    <p><a href="./citation-validator.html">Open Citation Validator</a></p>
